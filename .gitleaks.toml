# .gitleaks.toml — NEXUS OS workspace leak rules
# Tuned for Python/FastAPI codebase with AI agent patterns

[rules]
  # Drift tokens — operational identifiers, not secrets
  [[rules.allowlist]]
    description = "Drill run tokens (operational task IDs)"
    regex = "DR-[A-Z0-9]{2}_[0-9]{8}"

  # LLM parameters mistakenly flagged as API keys
  [[rules.allowlist]]
    description = "LLM hyperparameters (crowding_penalty, temperature, etc.)"
    regex = "(crowding_penalty|temperature|top_p|max_tokens)\\s*[=:]\\s*[0-9.]+"

  # JSON field names that look like keys but are not secrets
  [[rules.allowlist]]
    description = "JSON field names containing 'key' but not actual secrets"
    regex = "\"[a-z_]+key\"\\s*:\\s*\"[^\"]{0,20}\""

  # Model routing identifiers
  [[rules.allowlist]]
    description = "Model/endpoint routing labels"
    regex = "(model|router|endpoint|provider)\\s*[=:]\\s*[\"']?[a-zA-Z0-9_/-]{3,30}"

[git]
  # Scan these but ignore known false positive patterns
  include_paths = ["src/", "tests/", "scripts/", "research/"]
  exclude_paths = [
    "**/node_modules/**",
    "**/.venv/**",
    "**/__pycache__/**",
    "**/.git/**",
    "Trash/**",
    "**/Trash/**",
    "**/*.pyc",
    "**/nexus_os/**/stresslab/templates/**",
  ]

[[rules]]
  id = "generic-api-key"
  path = "src/|tests/|research/"
  description = "Generic API key pattern (strict)"
  regex = "(?i)(api[_-]?key|apikey|api[_-]?token|secret[_-]?key)\\s*[=:]\\s*['\"][A-Za-z0-9]{20,}"
  stop_on_first = true

[[rules]]
  id = "github-token"
  description = "GitHub personal access token"
  regex = "gh[pousr]_[A-Za-z0-9]{36,}"

[[rules]]
  id = "openai-key"
  description = "OpenAI API key"
  regex = "sk-[A-Za-z0-9]{48}"

[[rules]]
  id = "azure-openai-key"
  description = "Azure OpenAI key pattern"
  regex = "[A-Za-z0-9]{32,}"

[[rules]]
  id = "nvidia-api-key"
  description = "NVIDIA API key"
  regex = "(nvapi-|nvidia_)[A-Za-z0-9_-]{20,}"

[[rules]]
  id = "anthropic-key"
  description = "Anthropic API key"
  regex = "sk-ant-[A-Za-z0-9-]{50,}"

[[rules]]
  id = "jwt-token"
  description = "JWT token"
  regex = "eyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"