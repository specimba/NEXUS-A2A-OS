name: Nexus OS CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Run NEXUS OS test suite
        run: |
          python3 Skills/nexus-os/NEXUS-TEST.py

      - name: Assert 9/9 tests pass
        run: |
          result=$(python3 Skills/nexus-os/NEXUS-TEST.py)
          echo "$result"
          echo "$result" | grep -q "9/9 passed" && echo "ALL TESTS PASSED" || (echo "TESTS FAILED" && exit 1)
